<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngiSphere - Engineer Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #1e5b82; 
            --bg-color: #f4f7f6;
            --text-main: #333;
            --card-bg: #fff;
        }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styling */
        .sidebar { width: 250px; background-color: var(--sidebar-bg); color: white; display: flex; flex-direction: column; }
        .logo-area { padding: 20px; font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 10px; background: #184c6e; }
        .nav-links { list-style: none; padding: 0; margin: 20px 0; }
        .nav-links li { padding: 15px 25px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px; }
        .nav-links li:hover, .nav-links li.active { background-color: rgba(255,255,255,0.1); border-left: 4px solid #fff; }
        .nav-links i { width: 20px; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        
        /* Top Navbar */
        .topbar { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .topbar h2 { margin: 0; color: var(--text-main); }
        .top-icons { display: flex; gap: 20px; align-items: center; font-size: 20px; color: #666; }
        .profile-icon { background: var(--sidebar-bg); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 16px; }

        /* Dashboard Content */
        .dashboard-container { padding: 30px; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-upload { background: var(--sidebar-bg); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; }

        /* Charts Row */
        .charts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .chart-card { background: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .chart-card h3 { margin-top: 0; font-size: 16px; color: #555; margin-bottom: 15px; }

        /* Activities / Real Database Table */
        .activities-card { background: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #888; font-weight: normal; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <i class="fas fa-drafting-compass"></i> EngiSphere
        </div>
        <ul class="nav-links">
            <li class="active" onclick="window.location.href='index.html'"><i class="fas fa-th-large"></i> Dashboard</li>
            
            <li onclick="window.location.href='projects.html'"><i class="far fa-folder"></i> Projects</li>
            
            <li onclick="window.location.href='client_dashboard.html'"><i class="fas fa-user-tie"></i> Client Portal</li>
            
            <li><i class="fas fa-tasks"></i> Tasks</li>
            
            <li onclick="window.location.href='home.html'"><i class="fas fa-globe"></i> Main Website</li>
            
            <li style="margin-top: auto;" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h2>Engineer Dashboard</h2>
            <div class="top-icons">
                <i class="far fa-bell"></i>
                <i class="far fa-envelope"></i>
                <div class="profile-icon" id="user-initial">M</div>
            </div>
        </div>

        <div class="dashboard-container">
            <div class="header-actions">
                <h2 style="margin: 0; color: #333;">Project Overview: Q4 2026</h2>
                <a href="projects.html" class="btn-upload"><i class="fas fa-plus"></i> Add New Project</a>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Project Status</h3>
                    <canvas id="pieChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Tasks by Priority</h3>
                    <canvas id="barChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Hours Logged This Week</h3>
                    <canvas id="lineChart"></canvas>
                </div>
            </div>

            <div class="activities-card">
                <h3>Recent Activities & Projects</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Project Title</th>
                            <th>Description</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="projects-table">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
       
        document.addEventListener("DOMContentLoaded", () => {
            const userName = localStorage.getItem("user_name");
            if (!userName) window.location.href = "login.html";
            else {
                document.getElementById('user-initial').innerText = userName.charAt(0).toUpperCase();
                loadProjects(); // 
                initCharts(); //
            }
        });

        
        async function loadProjects() {
    const token = localStorage.getItem("access_token");
    
    if (!token) {
        window.location.href = "login.html";
        return;
    }

    try {
        const response = await fetch("http://127.0.0.1:8000/projects/", {
            method: "GET",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            }
        });

        if (response.status === 401) {
            localStorage.clear();
            window.location.href = "login.html";
            return;
        }

        const projects = await response.json();
        const tableBody = document.getElementById('projects-table');
        tableBody.innerHTML = ""; 

        projects.forEach(proj => {
            tableBody.innerHTML += `
                <tr>
                    <td><strong>${proj.title}</strong></td>
                    <td>${proj.description}</td>
                    <td><span class="status-badge" style="background: #3498db;">${proj.status}</span></td>
                </tr>
            `;
        });
    } catch (error) { 
        console.error("Error:", error); 
    }
}


        function initCharts() {
            // Pie Chart
            new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: { labels: ['Active', 'Pending', 'Completed'], datasets: [{ data: [50, 20, 30], backgroundColor: ['#2980b9', '#3498db', '#2ecc71'] }] },
                options: { responsive: true }
            });

            // Bar Chart
            new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: { labels: ['Active', 'Pending', 'Priority', 'Low'], datasets: [{ label: 'Tasks', data: [6, 4, 3, 2], backgroundColor: '#1e5b82' }] },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });

            // Line Chart
            new Chart(document.getElementById('lineChart'), {
                type: 'line',
                data: { labels: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'], datasets: [{ label: 'Hours', data: [6, 8, 5, 9, 13, 9, 2], borderColor: '#1e5b82', fill: false, tension: 0.4 }] },
                options: { responsive: true }
            });
        }

        function logout() { localStorage.clear(); window.location.href = "login.html"; }
    </script>
</body>
</html>
