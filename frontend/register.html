<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngiSphere - Register Engineer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #2ecc71; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #27ae60; }
        #msg { text-align: center; margin-top: 15px; font-weight: bold; min-height: 20px; }
        .login-link { display: block; margin-top: 15px; color: #1e5b82; text-decoration: none; font-size: 14px; }
        .login-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Register</h2>
        <form id="registerForm">
            <input type="text" id="r_name" placeholder="Full Name" required>
            <input type="email" id="r_email" placeholder="Email Address" required>
            <input type="password" id="r_pass" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>
        <p id="msg"></p>
        <a href="login.html" class="login-link">Already have an account? Login</a>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const msg = document.getElementById('msg');
            msg.style.color = "blue";
            msg.innerText = "Registering...";

            const userData = {
                full_name: document.getElementById('r_name').value.trim(),
                email: document.getElementById('r_email').value.trim(),
                password: document.getElementById('r_pass').value
            };

            try {
                const res = await fetch("http://127.0.0.1:8000/register/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(userData)
                });

                if (res.ok) {
                    msg.style.color = "green";
                    msg.innerText = "Registration successful! Redirecting to login...";
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1500);
                } else {
                    const errorData = await res.json();
                    msg.style.color = "red";
                    msg.innerText = errorData.detail || "Registration failed.";
                }
            } catch (err) {
                msg.style.color = "red";
                msg.innerText = "Connection error to the server.";
            }
        });
    </script>
</body>
</html>
