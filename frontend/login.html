<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngiSphere - Secure Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #1e5b82; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #1e5b82; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #184c6e; }
        #msg { text-align: center; margin-top: 15px; font-weight: bold; min-height: 20px; }
        .register-link { display: block; margin-top: 15px; color: #1e5b82; text-decoration: none; font-size: 14px; }
        .register-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h2>EngiSphere Login</h2>
        <form id="loginForm">
            <input type="email" id="l_email" placeholder="Email Address" required>
            <input type="password" id="l_pass" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p id="msg"></p>
        <a href="register.html" class="register-link">New Engineer? Register here</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const msg = document.getElementById('msg');
            msg.style.color = "blue";
            msg.innerText = "Authenticating...";

            
            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('l_email').value); 
            formData.append('password', document.getElementById('l_pass').value);

            try {
                const res = await fetch("http://127.0.0.1:8000/login/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: formData
                });

                if (res.ok) {
                    const data = await res.json();
                    
                    
                    localStorage.setItem("access_token", data.access_token);
                    localStorage.setItem("user_name", data.user_name);
                    
                    msg.style.color = "green";
                    msg.innerText = "Login Successful! Redirecting...";
                    
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                } else {
                    msg.style.color = "red";
                    msg.innerText = "Invalid Email or Password.";
                }
            } catch (err) {
                msg.style.color = "red";
                msg.innerText = "Connection error to the server.";
            }
        });
    </script>
</body>
</html>
