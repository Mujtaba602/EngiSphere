<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login - EngiSphere</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* نفس الهوية البصرية لباقي المشروع */
        :root {
            --primary: #2563eb;       
            --primary-dark: #1e40af;  
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;      
            --card-bg: #ffffff;
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e2e8f0 100%); /* خلفية متدرجة فخمة */
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* صندوق تسجيل الدخول */
        .login-card {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            text-decoration: none;
        }

        .login-card p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 15px;
        }

        /* تصميم الحقول */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: var(--text-dark);
            box-sizing: border-box;
            transition: 0.3s;
            background: #f8fafc;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        /* زر الدخول */
        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
        }
        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }
        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="home.html" class="logo">
            <i class="fas fa-drafting-compass"></i> EngiSphere
        </a>
        <p>Welcome back! Please login to your account.</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-control" placeholder="engineer@engisphere.com" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <a href="home.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Main Website</a>
    </div>

    <script>
        function handleLogin(event) {
            // 1. نمنع المتصفح من تحديث الصفحة فوراً
            event.preventDefault(); 

            // 2. نخبر المتصفح أن يحفظ حالة الدخول في الذاكرة
            localStorage.setItem("isLoggedIn", "true"); 

            // 3. ننقل المستخدم إلى لوحة التحكم
            window.location.href = "index.html"; 
        }
    </script>

</body>
</html>
